    <script>
      // Prevent FOUC — apply saved theme before render
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'thunder') document.documentElement.classList.add('thunder');
          else if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
